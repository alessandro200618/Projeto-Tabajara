<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Usuário • Santos FC</title>
    
    <!-- Bootstrap 5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --success-gradient: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --warning-gradient: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%);
            --glass-bg: rgba(255, 215, 0, 0.1);
            --glass-border: rgba(255, 215, 0, 0.2);
            --glass-hover: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #000000, #1a1a1a, #2d2d2d, #000000, #1a1a1a, #FFD700);
            background-size: 600% 600%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            padding-top: 100px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s linear infinite;
            opacity: 0.08;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(360deg); }
        }

        .navbar {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        .form-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3.5rem;
            box-shadow: 0 30px 80px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--primary-gradient);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .form-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            border-color: rgba(255,255,255,0.3);
        }

        .form-card:hover::before {
            transform: scaleX(1);
        }

        .form-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .form-header i {
            font-size: 4rem;
            background: var(--glass-bg);
            width: 120px;
            height: 120px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            border: 2px solid var(--glass-border);
            color: #4facfe;
        }

        .form-title {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }

        .form-subtitle {
            color: rgba(255,255,255,0.7);
            font-weight: 300;
            font-size: 1.1rem;
        }

        .form-floating {
            position: relative;
            margin-bottom: 2rem;
        }

        .form-control {
            background: rgba(255,255,255,0.08);
            border: 2px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px 24px;
            font-size: 1rem;
            color: #ffffff;
            height: 70px;
            backdrop-filter: blur(20px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .form-control:focus {
            background: rgba(255,255,255,0.15);
            border-color: #667eea;
            box-shadow: 0 0 0 0.3rem rgba(102, 126, 234, 0.2);
            color: #ffffff;
            transform: translateY(-2px);
        }

        .form-control::placeholder {
            color: rgba(255,255,255,0.4);
        }

        .form-floating > label {
            color: rgba(255,255,255,0.7);
            font-weight: 400;
            padding-left: 24px;
            transform: translateY(50%);
            transition: all 0.3s ease;
        }

        .form-floating:focus-within > label {
            color: #667eea;
            transform: translateY(-10px) scale(0.85);
        }

        .btn-salvar {
            background: var(--success-gradient);
            border: none;
            border-radius: 20px;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            width: 100%;
            height: 70px;
            color: #ffffff;
            box-shadow: 0 15px 40px rgba(79, 172, 254, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 1rem;
        }

        .btn-salvar:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 50px rgba(79, 172, 254, 0.6);
            color: #ffffff !important;
        }

        .btn-cancelar {
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--glass-border);
            color: rgba(255,255,255,0.9);
            border-radius: 20px;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 500;
            width: 100%;
            height: 70px;
            text-decoration: none;
            display: block;
            transition: all 0.3s ease;
        }

        .btn-cancelar:hover {
            background: rgba(255,255,255,0.2);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .alert {
            border-radius: 20px;
            border: none;
            backdrop-filter: blur(20px);
            margin-bottom: 2rem;
        }

        @media (max-width: 576px) {
            .form-card { padding: 2.5rem 2rem; margin: 1rem; }
            .form-title { font-size: 1.8rem; }
        }

        .form-card { animation: slideInUp 0.8s ease forwards; opacity: 0; transform: translateY(30px); }
        @keyframes slideInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="bi bi-soccer me-2"></i> Santos FC
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/usuarios/listar">← Voltar aos Usuários</a>
        </div>
    </div>
</nav>

<div class="form-container">
    
    <!-- ALERTAS (futuro uso) -->
    <!-- <div th:if="${#fields.hasErrors('global')}" class="alert alert-warning">
        <i class="bi bi-exclamation-triangle me-2"></i>
        Verifique os campos e tente novamente.
    </div> -->

    <!-- FORMULÁRIO -->
    <div class="form-card">
        <div class="form-header">
            <div>
                <i class="bi bi-person-plus"></i>
            </div>
            <h1 class="form-title">Criar Novo Usuário - Santos FC</h1>
            <p class="form-subtitle">Preencha os dados abaixo para cadastrar um novo usuário no sistema</p>
        </div>

        <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
            
            <!-- NOME -->
            <div class="form-floating">
                <input type="text" 
                       th:field="*{nomeUsuario}" 
                       class="form-control" 
                       id="nomeUsuario" 
                       placeholder="Nome Completo"
                       required>
                <label for="nomeUsuario">
                    <i class="bi bi-person me-2"></i>Nome Completo
                </label>
            </div>

            <!-- EMAIL -->
            <div class="form-floating">
                <input type="email" 
                       th:field="*{emailUsuario}" 
                       class="form-control" 
                       id="emailUsuario" 
                       placeholder="email@exemplo.com"
                       required>
                <label for="emailUsuario">
                    <i class="bi bi-envelope me-2"></i>Email
                </label>
            </div>

            <!-- LOGIN -->
            <div class="form-floating">
                <input type="text" 
                       th:field="*{loginUsuario}" 
                       class="form-control" 
                       id="loginUsuario" 
                       placeholder="Login do usuário"
                       required>
                <label for="loginUsuario">
                    <i class="bi bi-person-badge me-2"></i>Login
                </label>
            </div>

            <!-- SENHA -->
            <div class="form-floating">
                <input type="password" 
                       th:field="*{senhaUsuario}" 
                       class="form-control" 
                       id="senhaUsuario" 
                       placeholder="Senha segura"
                       required>
                <label for="senhaUsuario">
                    <i class="bi bi-lock me-2"></i>Senha
                </label>
            </div>

            <!-- BOTÕES -->
            <button type="submit" class="btn btn-salvar">
                <i class="bi bi-check-circle me-2"></i>
                Salvar Usuário
            </button>

            <a th:href="@{/usuarios/listar}" class="btn-cancelar">
                <i class="bi bi-x-circle me-2"></i>
                Cancelar
            </a>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Validação em tempo real (opcional)
    document.querySelectorAll('.form-control').forEach(input => {
        input.addEventListener('input', function() {
            if (this.value.trim()) {
                this.parentElement.classList.add('has-value');
            } else {
                this.parentElement.classList.remove('has-value');
            }
        });
    });
</script>

</body>
</html>
