<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Criar Usuário</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container py-5">
    <h2 class="mb-4">Criar Usuário</h2>

    <form th:action="@{/usuarios/salvar}" th:object="${usuario}" method="post">
        <div class="mb-3">
            <label for="nomeUsuario" class="form-label">Nome</label>
            <input type="text" th:field="*{nomeUsuario}" class="form-control" id="nomeUsuario" required>
        </div>
        <div class="mb-3">
            <label for="emailUsuario" class="form-label">Email</label>
            <input type="email" th:field="*{emailUsuario}" class="form-control" id="emailUsuario" required>
        </div>
        <div class="mb-3">
            <label for="loginUsuario" class="form-label">Login</label>
            <input type="text" th:field="*{loginUsuario}" class="form-control" id="loginUsuario" required>
        </div>
        <div class="mb-3">
            <label for="senhaUsuario" class="form-label">Senha</label>
            <input type="password" th:field="*{senhaUsuario}" class="form-control" id="senhaUsuario" required>
        </div>

        <button type="submit" class="btn btn-primary">Salvar</button>
        <a th:href="@{/usuarios/listar}" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

</body>
</html>
