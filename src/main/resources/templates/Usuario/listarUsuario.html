<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Usuários</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-dark text-white">

<div class="container py-5">
    <h2 class="mb-4">Lista de Usuários</h2>
    
    <a th:href="@{/usuarios/criar}" class="btn btn-success mb-3">
        <i class="bi bi-plus-circle"></i> Novo Usuário
    </a>

    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
                <th>Login</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.idUsuario}"></td>
                <td th:text="${u.nomeUsuario}"></td>
                <td th:text="${u.emailUsuario}"></td>
                <td th:text="${u.loginUsuario}"></td>
                <td>
                    <a th:href="@{'/usuarios/excluir/' + ${u.idUsuario}}" class="btn btn-danger btn-sm">
                        <i class="bi bi-trash"></i> Excluir
                    </a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
