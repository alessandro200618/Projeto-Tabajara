<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários • Organizações Tabajara</title>
    
    <!-- Bootstrap 5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --danger-gradient: linear-gradient(135deg, #f5576c 0%, #fa709a 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --glass-hover: rgba(255, 255, 255, 0.12);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            background: linear-gradient(-45deg, #0f0f23, #1a1a2e, #16213e, #0f3460, #533a7c, #0ea5e9);
            background-size: 600% 600%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            padding-top: 100px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s linear infinite;
            opacity: 0.08;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(360deg); }
        }

        .navbar {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            letter-spacing: 1px;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-header {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .page-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--primary-gradient);
        }

        .page-title {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #e0e7ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn-novo {
            background: var(--success-gradient);
            border: none;
            border-radius: 16px;
            padding: 14px 28px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(79, 172, 254, 0.4);
            transition: all 0.3s ease;
        }

        .btn-novo:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px rgba(79, 172, 254, 0.6);
            color: #ffffff !important;
        }

        .table-container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .table {
            margin: 0;
            border-radius: 0;
            background: transparent;
        }

        .table thead th {
            background: rgba(255,255,255,0.1);
            border: none;
            font-weight: 600;
            color: rgba(255,255,255,0.95);
            padding: 1.5rem 1.25rem;
            border-bottom: 2px solid var(--glass-border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .table tbody tr {
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .table tbody tr:hover {
            background: var(--glass-hover);
            transform: scale(1.01);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .table td {
            padding: 1.25rem;
            vertical-align: middle;
            color: #000000;
            border: none;
        }

        .btn-excluir {
            background: var(--danger-gradient);
            border: none;
            border-radius: 12px;
            padding: 8px 16px;
            font-size: 0.9rem;
            font-weight: 500;
            color: #ffffff;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(245, 87, 108, 0.4);
        }

        .btn-excluir:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(245, 87, 108, 0.6);
            color: #ffffff !important;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: rgba(255,255,255,0.6);
        }

        .empty-state i {
            font-size: 5rem;
            opacity: 0.3;
            margin-bottom: 1rem;
        }

        .btn-back {
            background: rgba(255,255,255,0.1);
            border: 2px solid var(--glass-border);
            color: rgba(255,255,255,0.9);
            border-radius: 16px;
            padding: 12px 24px;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 1rem;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.2);
            color: #ffffff;
            transform: translateY(-1px);
        }

        @media (max-width: 768px) {
            .page-title { font-size: 2rem; }
            .table-responsive { font-size: 0.9rem; }
        }

        .fade-in { animation: fadeInUp 0.6s ease forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="bi bi-building me-2"></i> Organizações Tabajara
        </a>
        <div class="navbar-nav ms-auto">
            <a class="nav-link" href="/">Dashboard</a>
        </div>
    </div>
</nav>

<div class="container py-4 py-lg-5" style="max-width: 1400px;">
    
    <!-- HEADER -->
    <div class="page-header fade-in">
        <div class="row align-items-center">
            <div class="col">
                <h1 class="page-title">
                    <i class="bi bi-people"></i>
                    Gerenciar Usuários
                </h1>
                <p class="mb-0" style="color: rgba(255,255,255,0.7); font-size: 1.1rem;">
                    Visualize, edite e gerencie todos os usuários do sistema
                </p>
            </div>
            <div class="col-auto">
                <a th:href="@{/usuarios/criar}" class="btn btn-novo">
                    <i class="bi bi-plus-circle me-2"></i>
                    Novo Usuário
                </a>
            </div>
        </div>
    </div>

    <!-- TABELA -->
    <div class="table-container fade-in" style="animation-delay: 0.2s;">
        <div class="table-responsive">
            <table class="table mb-0">
                <thead>
                    <tr>
                        <th><i class="bi bi-hash"></i> ID</th>
                        <th><i class="bi bi-person"></i> Nome</th>
                        <th><i class="bi bi-envelope"></i> Email</th>
                        <th><i class="bi bi-person-badge"></i> Login</th>
                        <th><i class="bi bi-gear"></i> Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td>
                            <strong th:text="${u.idUsuario}"></strong>
                        </td>
                        <td>
                            <div class="d-flex align-items-center">
                                <i class="bi bi-person-circle text-muted me-2" style="font-size: 1.5rem;"></i>
                                <span th:text="${u.nomeUsuario}"></span>
                            </div>
                        </td>
                        <td>
                            <i class="bi bi-envelope me-2"></i>
                            <span th:text="${u.emailUsuario}"></span>
                        </td>
                        <td th:text="${u.loginUsuario}"></td>
                        <td>
                            <div class="d-flex gap-2">
                                <!-- EDITAR (futuro) -->
                                <!-- <a class="btn btn-outline-light btn-sm">Editar</a> -->
                                <a th:href="@{'/usuarios/excluir/' + ${u.idUsuario}}" 
                                   class="btn btn-excluir btn-sm"
                                   onclick="return confirm('Tem certeza que deseja excluir este usuário?')">
                                    <i class="bi bi-trash"></i> Excluir
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${usuarios.isEmpty()}" class="empty-state fade-in" style="animation-delay: 0.2s;">
        <i class="bi bi-people"></i>
        <h3>Nenhum usuário encontrado</h3>
        <p>Crie o primeiro usuário para começar a gerenciar o sistema.</p>
        <a th:href="@{/usuarios/criar}" class="btn btn-novo">
            <i class="bi bi-plus-circle me-2"></i>
            Criar Primeiro Usuário
        </a>
    </div>

    <!-- BOTÃO VOLTAR -->
    <div class="text-center mt-4 fade-in" style="animation-delay: 0.4s;">
        <a href="/" class="btn-back">
            <i class="bi bi-arrow-left"></i>
            Voltar ao Dashboard
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
