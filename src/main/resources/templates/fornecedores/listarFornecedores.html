<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Listagem de Fornecedores</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* Fundo animado */
body {
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(-45deg,#020617,#0f172a,#1e3a8a,#0ea5e9);
    background-size:400% 400%;
    animation: gradient 12s ease infinite;
    color:white;
    min-height:100vh;
    padding:30px;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* Títulos */
h1 {
    text-align: center;
    margin-bottom: 30px;
    color: #00bcd4;
}

h3 a {
    text-decoration: none;
    color: #10b981; /* verde */
    font-weight: bold;
}

h3 a:hover {
    color: #059669;
}

/* Tabela */
table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 20px;
    background-color: rgba(0,0,0,0.7);
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.14);
}

th, td {
    padding: 12px;
    text-align: left;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    color: #f8fafc;
}

th {
    background-color: rgba(15,23,42,0.95);
    color: #a5f3fc;
}

tr:hover {
    background-color: rgba(255,255,255,0.1);
}

/* Botões de ação */
a.action-btn {
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 5px;
    color: white;
    font-weight: bold;
    transition: 0.3s;
}

a.edit-btn {
    background-color: #2563eb; /* azul */
}

a.edit-btn:hover {
    background-color: #1d4ed8;
}

a.delete-btn {
    background-color: #dc2626; /* vermelho */
}

a.delete-btn:hover {
    background-color: #b91c1c;
}

/* Botão Voltar */
a.back-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background-color: #6b7280; /* cinza escuro */
    border-radius: 8px;
    color: white;
    text-decoration: none;
    font-weight: bold;
    transition: 0.3s;
}

a.back-btn:hover {
    background-color: #4b5563;
}
</style>
</head>
<body>

<h1>Listagem de Fornecedores</h1>

<h3><a th:href="@{/fornecedores/criar}">➕ Adicionar Novo Fornecedor</a></h3>

<table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>CNPJ</th>
            <th>Endereço</th>
            <th>Telefone</th>
            <th>Cidade</th>
            <th colspan="2">Ações</th>
        </tr>
    </thead>
    <tbody>
        <tr th:each="fornecedor : ${fornecedores}">
            <td th:text="${fornecedor.idFornecedor}">ID</td>
            <td th:text="${fornecedor.nomeFornecedor}">Nome</td>
            <td th:text="${fornecedor.cnpjFornecedor}">CNPJ</td>
            <td th:text="${fornecedor.enderecoFornecedor}">Endereço</td>
            <td th:text="${fornecedor.telefoneFornecedor}">Telefone</td>
            <td th:text="${fornecedor.cidadeFornecedor}">Cidade</td>
            <td>
                <a th:href="@{/fornecedores/editar/{id}(id=${fornecedor.idFornecedor})}" class="action-btn edit-btn">Editar</a>
            </td>
            <td>
                <a th:href="@{/fornecedores/excluir/{id}(id=${fornecedor.idFornecedor})}" 
                   class="action-btn delete-btn"
                   onclick="return confirm('Tem certeza que deseja excluir este fornecedor?');">Excluir</a>
            </td>
        </tr>
    </tbody>
</table>

<a th:href="@{/tabajara}" class="back-btn">⬅ Voltar para o painel</a>

</body>
</html>
