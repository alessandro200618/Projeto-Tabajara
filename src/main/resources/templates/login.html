<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Organizações Tabajara</title>
    
    <!-- Bootstrap 5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            background: linear-gradient(-45deg, #0f0f23, #1a1a2e, #16213e, #0f3460);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            max-width: 420px;
            width: 100%;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
        }

        .btn-login {
            background: var(--primary-gradient);
            border: none;
            border-radius: 16px;
            padding: 16px;
            width: 100%;
            color: #fff;
        }

        .form-control {
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <div th:if="${param.error}" class="alert alert-danger">
        Credenciais inválidas.
    </div>

    <div th:if="${param.resetSucesso}" class="alert alert-success">
        Senha redefinida com sucesso!
    </div>

    <div class="login-card">
        <h2 class="text-center mb-4">Login</h2>

        <form th:action="@{/login}" method="post">
            <input type="text" class="form-control" name="username" placeholder="Login" required>
            <input type="password" class="form-control" name="password" placeholder="Senha" required>

            <button type="submit" class="btn btn-login">
                Entrar no Sistema
            </button>

            <!-- 🔥 AQUI FOI ADICIONADO (SEM MEXER NO RESTO) -->
            <div style="text-align: center; margin-top: 1.5rem;">
                <span style="color: rgba(255,255,255,0.7);">
                    Não tem uma conta?
                </span>

                <a th:href="@{/usuarios/criar}" style="
                    display: block;
                    margin-top: 0.6rem;
                    color: #667eea;
                    font-weight: 600;
                    text-decoration: none;
                ">
                    <i class="bi bi-person-plus me-1"></i>
                    Criar conta
                </a>

                <a th:href="@{/esqueci-senha}" style="
                    display: block;
                    margin-top: 0.6rem;
                    color: #667eea;
                    font-weight: 600;
                    text-decoration: none;
                ">
                    <i class="bi bi-key me-1"></i>
                    Esqueci minha senha
                </a>
            </div>

        </form>

        <a href="/" class="btn btn-outline-light mt-3 w-100">
            Voltar
        </a>
    </div>
</div>

</body>
</html>
