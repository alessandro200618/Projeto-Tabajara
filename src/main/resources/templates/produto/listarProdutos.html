<!DOCTYPE html>
<html lang="pt" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listagem de Produtos - Santos FC</title>
    
    <!-- Bootstrap 5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- DataTables CSS -->
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --success-gradient: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            --warning-gradient: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%);
            --danger-gradient: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            --glass-bg: rgba(255, 215, 0, 0.08);
            --glass-border: rgba(255, 215, 0, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            
            /* Mesmo background do dashboard */
            background: linear-gradient(-45deg, #000000, #1a1a1a, #2d2d2d, #000000, #1a1a1a, #FFD700);
            background-size: 600% 600%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            padding: 0;
        }

        /* Partículas de fundo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.8), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s linear infinite;
            opacity: 0.08;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(360deg); }
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Header */
        .page-header {
            padding: 120px 0 60px;
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .page-title {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #FFD700 0%, #FFA500 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1rem;
        }

        .page-subtitle {
            font-size: 1.2rem;
            opacity: 0.9;
            font-weight: 400;
        }

        /* Main Content */
        .main-content {
            padding: 0 20px 80px;
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Botão Adicionar */
        .add-btn {
            background: var(--success-gradient);
            border: none;
            border-radius: 16px;
            padding: 16px 32px;
            font-size: 1.1rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
            margin-bottom: 2rem;
        }

        .add-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
            color: white !important;
        }

        /* Tabela Glassmorphism */
        .table-container {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(25px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .table {
            margin: 0;
            color: #000000;
            font-size: 0.95rem;
        }

        .table thead th {
            background: rgba(15, 15, 35, 0.9) !important;
            border: none;
            padding: 20px 16px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-size: 0.85rem;
            color: #e2e8f0;
        }

        .table tbody td {
            padding: 18px 16px;
            border-color: rgba(255,255,255,0.08);
            vertical-align: middle;
        }

        .table tbody tr {
            transition: all 0.3s ease;
            border-radius: 12px;
            margin: 4px 0;
        }

        .table tbody tr:hover {
            background: rgba(255, 255, 255, 0.12) !important;
            transform: scale(1.01);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-action {
            padding: 8px 16px;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.3s ease;
            min-width: 90px;
            justify-content: center;
        }

        .btn-edit {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .btn-edit:hover {
            background: #3b82f6;
            color: white;
            transform: translateY(-1px);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
            transform: translateY(-1px);
        }

        /* Valor monetário */
        .valor {
            font-weight: 600;
            color: #10b981;
            font-size: 1.05rem;
        }

        /* Back Button */
        .back-section {
            margin-top: 3rem;
            text-align: center;
        }

        .btn-back {
            background: rgba(75, 85, 99, 0.2);
            border: 1px solid var(--glass-border);
            color: #d1d5db;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-back:hover {
            background: rgba(75, 85, 99, 0.4);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* DataTables custom */
        .dataTables_wrapper .dataTables_length,
        .dataTables_wrapper .dataTables_filter,
        .dataTables_wrapper .dataTables_info,
        .dataTables_wrapper .dataTables_paginate {
            color: #ffffff;
        }

        .dataTables_wrapper .dataTables_filter input {
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 8px;
        }

        .dataTables_wrapper .dataTables_filter input::placeholder {
            color: rgba(255,255,255,0.6);
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button {
            color: #ffffff !important;
            background: rgba(255,255,255,0.1) !important;
            border: 1px solid var(--glass-border) !important;
            margin: 0 2px;
            border-radius: 6px;
        }

        .dataTables_wrapper .dataTables_paginate .paginate_button:hover {
            background: var(--primary-gradient) !important;
            border-color: transparent !important;
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .page-header {
                padding: 100px 0 40px;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .btn-action {
                width: 100%;
                justify-content: center;
            }
        }

        /* Animations */
        .fade-in {
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(30px);
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/tabajara">
                <i class="bi bi-soccer me-2"></i>
                Santos FC
            </a>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header fade-in">
        <div class="container">
            <h1 class="page-title">
                <i class="bi bi-box-seam me-3"></i>
                Listagem de Produtos
            </h1>
            <p class="page-subtitle">Gerencie todos os produtos cadastrados no sistema</p>
        </div>
    </section>

    <!-- Main Content -->
    <div class="main-content">
        <div class="container">
            
            <!-- Botão Adicionar Produto -->
            <a th:href="@{/produtos/criar}" class="add-btn fade-in">
                <i class="bi bi-plus-circle"></i>
                Adicionar Novo Produto
            </a>

            <!-- Tabela Responsiva -->
            <div class="table-container">
                <table id="produtosTable" class="table table-hover" style="width:100%">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Descrição</th>
                            <th>Valor (R$)</th>
                            <th>Unidade</th>
                            <th>Marca</th>
                            <th>Fornecedor</th>
                            <th style="width: 180px;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="produto : ${produtos}" class="fade-in">
                            <td>
                                <strong th:text="${produto.idProduto}">#ID</strong>
                            </td>
                            <td>
                                <div class="fw-semibold" th:text="${produto.descricaoProduto}">Produto Exemplo</div>
                            </td>
                            <td>
                                <span class="valor" th:text="'R$ ' + ${#numbers.formatDecimal(produto.valorProduto, 1, 2)}">R$ 0,00</span>
                            </td>
                            <td th:text="${produto.unidadeProduto}">UN</td>
                            <td th:text="${produto.marcaProduto}">Marca</td>
                            <td th:text="${produto.fornecedor?.nomeFornecedor}">Fornecedor</td>
                            <td>
                                <div class="action-buttons">
                                    <a th:href="@{/produtos/editar/{id}(id=${produto.idProduto})}" 
                                       class="btn-action btn-edit" 
                                       title="Editar Produto">
                                        <i class="bi bi-pencil"></i> Editar
                                    </a>
                                    <a th:href="@{/produtos/excluir/{id}(id=${produto.idProduto})}" 
                                       class="btn-action btn-delete"
                                       onclick="return confirm('Tem certeza que deseja excluir este produto?\nEsta ação não pode ser desfeita.');"
                                       title="Excluir Produto">
                                        <i class="bi bi-trash"></i> Excluir
                                    </a>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Botão Voltar -->
            <div class="back-section">
                <a th:href="@{/tabajara}" class="btn-back">
                    <i class="bi bi-arrow-left"></i>
                    Voltar ao Dashboard
                </a>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables JS -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>
    
    <script>
        $(document).ready(function() {
            // Inicializar DataTables com configurações customizadas
            $('#produtosTable').DataTable({
                language: {
                    url: '//cdn.datatables.net/plug-ins/1.13.7/i18n/pt-BR.json'
                },
                pageLength: 10,
                responsive: true,
                order: [[0, 'desc']],
                columnDefs: [
                    { orderable: false, targets: -1 } // Desabilita ordenação na coluna de ações
                ],
                dom: 'Bfrtip',
                buttons: [
                    {
                        extend: 'excel',
                        text: '📊 Exportar Excel',
                        className: 'btn btn-success btn-sm me-2'
                    }
                ]
            });

            // Navbar scroll effect
            window.addEventListener('scroll', () => {
                const navbar = document.querySelector('.navbar');
                if (window.scrollY > 50) {
                    navbar.style.background = 'rgba(15, 15, 35, 0.98)';
                } else {
                    navbar.style.background = 'rgba(15, 15, 35, 0.95)';
                }
            });
        });
    </script>
</body>
</html>
