<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produto - Organizações Tabajara</title>
    
    <!-- Bootstrap 5.3.2 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --success-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --input-bg: rgba(30, 41, 59, 0.8);
            --input-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Inter', sans-serif;
            color: #ffffff;
            
            /* Mesmo background do dashboard */
            background: linear-gradient(-45deg, #0f0f23, #1a1a2e, #16213e, #0f3460, #533a7c, #0ea5e9);
            background-size: 600% 600%;
            animation: gradientShift 15s ease infinite;
            position: relative;
            overflow-x: hidden;
        }

        /* Partículas de fundo */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, rgba(255,255,255,0.6), transparent);
            background-repeat: repeat;
            background-size: 200px 100px;
            animation: float 20s linear infinite;
            opacity: 0.06;
            z-index: 0;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 100% 50%; }
            50% { background-position: 100% 100%; }
            75% { background-position: 0% 100%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            100% { transform: translateY(-20px) rotate(360deg); }
        }

        /* Navbar */
        .navbar {
            background: rgba(15, 15, 35, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 700;
            font-size: 1.4rem;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* CENTRALIZAÇÃO PERFEITA */
        .main-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: 80px; /* Espaço para navbar */
            padding-bottom: 60px;
            justify-content: center;
            align-items: center;
            position: relative;
            z-index: 1;
        }

        .form-wrapper {
            width: 100%;
            max-width: 520px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Form Card Glassmorphism */
        .form-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 3rem;
            width: 100%;
            max-width: 520px;
            box-shadow: 
                0 25px 50px rgba(0,0,0,0.25),
                inset 0 1px 0 rgba(255,255,255,0.1);
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--success-gradient);
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .form-card:hover::before {
            transform: scaleX(1);
        }

        /* Header */
        .form-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .form-title {
            font-size: clamp(1.75rem, 3vw, 2.5rem);
            font-weight: 800;
            background: linear-gradient(135deg, #10b981 0%, #34d399 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .form-subtitle {
            color: rgba(255,255,255,0.7);
            font-weight: 400;
            font-size: 1rem;
        }

        /* Form Group */
        .form-group {
            margin-bottom: 1.75rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.5rem;
            color: rgba(255,255,255,0.95);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Input Fields */
        .form-control {
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px 20px;
            font-size: 1rem;
            color: #ffffff;
            transition: all 0.3s ease;
            height: auto;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .form-control:focus {
            background: rgba(30, 41, 59, 0.95);
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 
                0 0 0 0.2rem rgba(16, 185, 129, 0.15),
                inset 0 2px 4px rgba(0,0,0,0.3);
            color: #ffffff;
            outline: none;
        }

        .form-control::placeholder {
            color: rgba(156, 163, 175, 0.7);
        }

        /* Select */
        .form-select {
            background: var(--input-bg);
            border: 2px solid transparent;
            border-radius: 16px;
            padding: 16px 20px;
            color: #ffffff;
            font-size: 1rem;
        }

        .form-select:focus {
            border-color: rgba(16, 185, 129, 0.5);
            box-shadow: 0 0 0 0.2rem rgba(16, 185, 129, 0.15);
            background: rgba(30, 41, 59, 0.95);
        }

        /* Submit Button */
        .btn-submit {
            background: var(--success-gradient);
            border: none;
            border-radius: 20px;
            padding: 18px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 15px 35px rgba(16, 185, 129, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-3px);
            box-shadow: 0 25px 50px rgba(16, 185, 129, 0.4);
            color: white !important;
        }

        /* Back Button */
        .btn-back {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 1.5rem;
            padding: 14px 28px;
            background: rgba(75, 85, 99, 0.2);
            border: 2px solid var(--glass-border);
            color: #d1d5db;
            text-decoration: none;
            border-radius: 20px;
            font-weight: 600;
            font-size: 1rem;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
            text-align: center;
            justify-content: center;
        }

        .btn-back:hover {
            background: rgba(75, 85, 99, 0.4);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-decoration: none;
        }

        /* Status Indicator */
        .status-indicator {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 12px;
            height: 12px;
            background: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        /* Edit Mode */
        .form-card.edit-mode::before {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
        }

        .form-card.edit-mode .form-title {
            background: linear-gradient(135deg, #3b82f6 0%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Responsive */
        @media (max-width: 576px) {
            .main-container {
                padding-top: 100px;
                padding-bottom: 40px;
            }
            
            .form-card {
                padding: 2rem;
                margin: 0 10px;
            }
        }

        /* Form Validation */
        .is-invalid {
            border-color: #ef4444 !important;
        }

        .invalid-feedback {
            color: #fca5a5;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/tabajara">
                <i class="bi bi-building me-2"></i>
                Organizações Tabajara
            </a>
        </div>
    </nav>

    <!-- Main Container CENTRALIZADO -->
    <div class="main-container">
        <div class="form-wrapper">
            <div class="form-card" th:classappend="${produto.idProduto != null} ? 'edit-mode'">

                <!-- Status Indicator -->
                <div class="status-indicator"></div>

                <!-- Header -->
                <div class="form-header">
                    <h1 class="form-title">
                        <i class="bi" th:class="${produto.idProduto != null} ? 'bi-pencil-square' : 'bi-plus-circle'"></i>
                        <span th:text="${produto.idProduto != null} ? 'Editar Produto' : 'Novo Produto'">Novo Produto</span>
                    </h1>
                    <p class="form-subtitle" th:text="${produto.idProduto != null} ? 'Atualize as informações do produto' : 'Preencha todos os campos obrigatórios'">
                        Preencha todos os campos obrigatórios
                    </p>
                </div>

                <!-- Form -->
                <form th:action="@{/produtos/salvar}" method="POST" th:object="${produto}">
                    
                    <input type="hidden" th:field="*{idProduto}" />

                    <!-- Descrição -->
                    <div class="form-group">
                        <label for="descricaoProduto" class="form-label">Descrição do Produto</label>
                        <input type="text" 
                               class="form-control" 
                               th:field="*{descricaoProduto}" 
                               placeholder="Ex: Notebook Dell Inspiron 15"
                               th:errorclass="'form-control is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('descricaoProduto')}" 
                             th:errors="*{descricaoProduto}">Erro na descrição</div>
                    </div>

                    <!-- Valor -->
                    <div class="form-group">
                        <label for="valorProduto" class="form-label">Valor (R$)</label>
                        <input type="number" 
                               step="0.01"
                               class="form-control" 
                               th:field="*{valorProduto}" 
                               placeholder="0.00"
                               th:errorclass="'form-control is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('valorProduto')}" 
                             th:errors="*{valorProduto}">Valor inválido</div>
                    </div>

                    <!-- Unidade -->
                    <div class="form-group">
                        <label for="unidadeProduto" class="form-label">Unidade de Medida</label>
                        <input type="text" 
                               class="form-control" 
                               th:field="*{unidadeProduto}" 
                               placeholder="Ex: un, kg, litro, m²"
                               th:errorclass="'form-control is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('unidadeProduto')}" 
                             th:errors="*{unidadeProduto}">Unidade inválida</div>
                    </div>

                    <!-- Marca -->
                    <div class="form-group">
                        <label for="marcaProduto" class="form-label">Marca</label>
                        <input type="text" 
                               class="form-control" 
                               th:field="*{marcaProduto}" 
                               placeholder="Ex: Samsung, Dell, Apple"
                               th:errorclass="'form-control is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('marcaProduto')}" 
                             th:errors="*{marcaProduto}">Marca inválida</div>
                    </div>

                    <!-- Fornecedor -->
                    <div class="form-group">
                        <label for="fornecedor" class="form-label">Fornecedor</label>
                        <select class="form-select" th:field="*{fornecedor.idFornecedor}" required>
                            <option value="" disabled>Selecione um fornecedor</option>
                            <option th:each="fornecedor : ${fornecedores}"
                                    th:value="${fornecedor.idFornecedor}"
                                    th:text="${fornecedor.nomeFornecedor}">
                            </option>
                        </select>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="btn-submit">
                        <i class="bi bi-check-circle"></i>
                        <span th:text="${produto.idProduto != null} ? 'Atualizar Produto' : 'Criar Produto'">Salvar Produto</span>
                    </button>

                </form>

                <!-- Back Button -->
                <a th:href="@{/produtos/listar}" class="btn-back">
                    <i class="bi bi-arrow-left"></i>
                    Voltar à Listagem
                </a>

            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Formatação automática de valor monetário
        const valorInput = document.querySelector('input[name="valorProduto"]');
        if (valorInput) {
            valorInput.addEventListener('input', function(e) {
                let value = parseFloat(e.target.value);
                if (!isNaN(value)) {
                    e.target.value = value.toLocaleString('pt-BR', {
                        minimumFractionDigits: 2,
                        maximumFractionDigits: 2
                    });
                }
            });
        }

        // Auto-focus no primeiro campo
        document.querySelector('input[name="descricaoProduto"]').focus();

        // Navbar scroll effect
        window.addEventListener('scroll', () => {
            const navbar = document.querySelector('.navbar');
            if (window.scrollY > 50) {
                navbar.style.background = 'rgba(15, 15, 35, 0.98)';
            } else {
                navbar.style.background = 'rgba(15, 15, 35, 0.95)';
            }
        });
    </script>
</body>
</html>
